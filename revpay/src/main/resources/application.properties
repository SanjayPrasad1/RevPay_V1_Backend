server.port=8080
spring.application.name=revpay-backend

#  DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/revpay_app_v5?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=userName
spring.datasource.password=Password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#  JWT
#app.jwt.secret=UmV2UGF5U3VwZXJTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25NdXN0QmVBdExlYXN0MjU2Qml0c0xvbmc!!
app.jwt.secret=UmV2UGF5U3VwZXJTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25NdXN0QmVBdExlYXN0MjU2Qml0c0xvbmc=
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

#  CORS
app.cors.allowed-origins=http://localhost:4200

#  Logging
logging.level.com.revpay=DEBUG
logging.level.org.springframework.security=DEBUG